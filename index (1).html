<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA 교육 챗봇</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }

  #setup-screen {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; padding: 2rem;
  }
  .setup-card {
    background: #fff; border: 1px solid #e0e0e0;
    border-radius: 16px; padding: 2rem; width: 100%; max-width: 480px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .setup-card h2 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 0.5rem; }
  .setup-card p { font-size: 14px; color: #666; margin-bottom: 1.5rem; line-height: 1.6; }
  .setup-card input {
    width: 100%; padding: 11px 14px; font-size: 14px;
    border: 1px solid #ddd; border-radius: 10px;
    background: #fafafa; color: #111; margin-bottom: 1rem;
  }
  .setup-card input:focus { outline: none; border-color: #888; }
  .btn-start {
    width: 100%; padding: 11px; font-size: 15px; font-weight: 600;
    background: #111; color: #fff;
    border: none; border-radius: 10px; cursor: pointer;
  }
  .btn-start:hover { background: #333; }
  .error-msg { font-size: 13px; color: #e53935; margin-top: 0.5rem; display: none; }

  #chat-screen { display: none; flex-direction: column; height: 100vh; }

  .chat-header {
    background: #fff; border-bottom: 1px solid #e0e0e0;
    padding: 14px 20px; display: flex; align-items: center; gap: 12px;
  }
  .chat-header-icon {
    width: 40px; height: 40px; border-radius: 50%;
    background: #e8f0fe; display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .chat-header-title { font-size: 15px; font-weight: 600; color: #111; }
  .chat-header-sub { font-size: 12px; color: #888; }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 1.5rem 1rem;
    display: flex; flex-direction: column; gap: 14px;
  }

  .msg-row { display: flex; gap: 8px; align-items: flex-end; }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
  }
  .msg-avatar.bot { background: #e8f0fe; color: #1a73e8; }
  .msg-avatar.user { background: #f0f0f0; color: #555; }

  .msg-bubble {
    max-width: 72%; padding: 11px 15px; border-radius: 18px;
    font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word;
  }
  .msg-bubble.bot {
    background: #fff; border: 1px solid #e0e0e0;
    color: #111; border-bottom-left-radius: 4px;
  }
  .msg-bubble.user {
    background: #111; color: #fff; border-bottom-right-radius: 4px;
  }

  .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
  .typing-indicator span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #aaa; animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  .quick-btns {
    display: flex; gap: 8px; flex-wrap: wrap;
    padding: 0 16px 10px; background: #fff;
  }
  .quick-btn {
    font-size: 12px; padding: 6px 13px;
    border: 1px solid #ddd; border-radius: 20px;
    background: #fff; color: #555; cursor: pointer;
  }
  .quick-btn:hover { background: #f5f5f5; color: #111; }

  .chat-input-area {
    background: #fff; border-top: 1px solid #e0e0e0;
    padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end;
  }
  .chat-input-area textarea {
    flex: 1; padding: 10px 15px; font-size: 14px;
    border: 1px solid #ddd; border-radius: 22px; resize: none;
    max-height: 120px; background: #fafafa; color: #111;
    font-family: inherit; line-height: 1.5; overflow-y: auto;
  }
  .chat-input-area textarea:focus { outline: none; border-color: #888; }
  .btn-send {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: #111; color: #fff; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .btn-send:hover { background: #333; }
  .btn-send:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-card">
    <h2>🎓 QA 교육 챗봇</h2>
    <p>소프트웨어 QA 과정 전용 AI 튜터입니다.<br>관리자에게 받은 API 키를 입력하면 바로 시작할 수 있어요.</p>
    <input type="password" id="api-key-input" placeholder="API 키 입력 (sk-proj-...)" />
    <button class="btn-start" onclick="startChat()">시작하기</button>
    <p class="error-msg" id="error-msg">⚠️ API 키를 다시 확인해주세요.</p>
  </div>
</div>

<div id="chat-screen">
  <div class="chat-header">
    <div class="chat-header-icon">🤖</div>
    <div>
      <div class="chat-header-title">QA 교육 튜터</div>
      <div class="chat-header-sub">소프트웨어 QA 과정 전용 AI 도우미</div>
    </div>
  </div>

  <div class="chat-messages" id="chat-messages"></div>

  <div class="quick-btns" id="quick-btns">
    <button class="quick-btn" onclick="sendQuick('테스트 케이스 작성법을 알려줘')">📋 테스트 케이스 작성법</button>
    <button class="quick-btn" onclick="sendQuick('버그 리포트는 어떻게 써야 해?')">🐛 버그 리포트 작성</button>
    <button class="quick-btn" onclick="sendQuick('블랙박스 테스트와 화이트박스 테스트 차이를 설명해줘')">🔍 블랙박스 vs 화이트박스</button>
    <button class="quick-btn" onclick="sendQuick('QA와 QC의 차이가 뭐야?')">❓ QA vs QC 차이</button>
    <button class="quick-btn" onclick="sendQuick('Jira로 버그를 어떻게 등록해?')">🛠️ Jira 사용법</button>
  </div>

  <div class="chat-input-area">
    <textarea id="user-input" placeholder="질문을 입력하세요... (Shift+Enter: 줄바꿈)" rows="1"
      oninput="autoResize(this)"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
    <button class="btn-send" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  let apiKey = '';
  let messages = [];

  const SYSTEM_PROMPT = `당신은 소프트웨어 QA(품질보증) 교육 전문 튜터입니다. 직업훈련 과정의 훈련생들을 가르치고 있습니다.

다음 주제에 대해 친절하고 명확하게 답변하세요:
- 테스트 케이스 작성 (블랙박스/화이트박스/그레이박스 테스트)
- 버그 리포트 작성법 및 결함 관리
- QA 프로세스 및 방법론 (V-모델, 애자일 테스팅 등)
- 테스트 자동화 기초 (Selenium, Cypress, JMeter 등)
- Jira, TestRail, Zephyr 등 QA 툴 사용법
- 성능 테스트, 보안 테스트 기초
- 소프트웨어 개발 생명주기(SDLC)에서 QA 역할

답변 규칙:
1. 훈련생 수준에 맞게 쉽고 친절하게 설명하세요.
2. 예시를 들어 설명하면 더 좋습니다.
3. QA와 관련 없는 질문은 정중하게 QA 관련 주제로 안내하세요.
4. 한국어로 답변하세요.`;

  function startChat() {
    const key = document.getElementById('api-key-input').value.trim();
    if (!key.startsWith('sk-')) {
      document.getElementById('error-msg').style.display = 'block';
      return;
    }
    apiKey = key;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    addMessage('bot', '안녕하세요! 소프트웨어 QA 교육 튜터입니다 😊\n테스트 케이스, 버그 리포트, QA 프로세스 등 궁금한 것을 뭐든 물어보세요!');
  }

  function addMessage(role, text) {
    const container = document.getElementById('chat-messages');
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar ' + role;
    avatar.textContent = role === 'bot' ? 'QA' : '나';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble ' + role;
    bubble.textContent = text;
    row.appendChild(avatar);
    row.appendChild(bubble);
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const container = document.getElementById('chat-messages');
    const row = document.createElement('div');
    row.className = 'msg-row bot'; row.id = 'typing-row';
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar bot'; avatar.textContent = 'QA';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble bot';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    row.appendChild(avatar); row.appendChild(bubble);
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = ''; input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
    document.getElementById('quick-btns').style.display = 'none';

    addMessage('user', text);
    messages.push({ role: 'user', content: text });
    addTyping();

    try {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + apiKey
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...messages],
          max_tokens: 1000
        })
      });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        addMessage('bot', '오류가 발생했어요: ' + data.error.message);
      } else {
        const reply = data.choices[0].message.content;
        messages.push({ role: 'assistant', content: reply });
        addMessage('bot', reply);
      }
    } catch (e) {
      removeTyping();
      addMessage('bot', '네트워크 오류가 발생했어요. 잠시 후 다시 시도해주세요.');
    }
    document.getElementById('send-btn').disabled = false;
  }

  function sendQuick(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
  }
</script>
</body>
</html>
