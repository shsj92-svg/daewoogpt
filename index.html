<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대우능력개발원</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }

  /* 셋업 화면 */
  #setup-screen {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; padding: 2rem;
  }
  .setup-card {
    background: #fff; border: 1px solid #e0e0e0;
    border-radius: 16px; padding: 2rem; width: 100%; max-width: 480px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .setup-card h2 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 0.5rem; }
  .setup-card p { font-size: 14px; color: #666; margin-bottom: 1.5rem; line-height: 1.6; }
  .setup-card input {
    width: 100%; padding: 11px 14px; font-size: 14px;
    border: 1px solid #ddd; border-radius: 10px;
    background: #fafafa; color: #111; margin-bottom: 1rem;
  }
  .setup-card input:focus { outline: none; border-color: #888; }
  .btn-start {
    width: 100%; padding: 11px; font-size: 15px; font-weight: 600;
    background: #111; color: #fff; border: none; border-radius: 10px; cursor: pointer;
  }
  .btn-start:hover { background: #333; }
  .error-msg { font-size: 13px; color: #e53935; margin-top: 0.5rem; display: none; }

  /* 앱 레이아웃 */
  #app-layout { display: none; height: 100vh; overflow: hidden; }

  /* 사이드바 */
  #sidebar {
    width: 260px; min-width: 260px; background: #111; color: #fff;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  .sidebar-header {
    padding: 16px 14px 12px; border-bottom: 1px solid #222;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-logo { font-size: 14px; font-weight: 700; color: #fff; }
  .btn-new-chat {
    font-size: 12px; padding: 6px 10px; border-radius: 8px;
    background: #222; color: #bbb; border: 1px solid #333; cursor: pointer;
  }
  .btn-new-chat:hover { background: #2a2a2a; color: #fff; }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .sidebar-date-label {
    font-size: 11px; color: #555; padding: 10px 14px 4px; letter-spacing: 0.3px;
  }
  .sidebar-item {
    padding: 9px 12px; font-size: 13px; color: #aaa; cursor: pointer;
    border-radius: 8px; margin: 1px 8px;
    display: flex; align-items: center; justify-content: space-between; gap: 6px;
  }
  .sidebar-item:hover { background: #1e1e1e; color: #fff; }
  .sidebar-item.active { background: #222; color: #fff; }
  .sidebar-item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
  .sidebar-item-del {
    font-size: 13px; color: #444; background: none; border: none;
    cursor: pointer; padding: 2px 5px; border-radius: 4px; flex-shrink: 0; display: none;
  }
  .sidebar-item:hover .sidebar-item-del { display: block; }
  .sidebar-item-del:hover { color: #e53935; background: #2a1a1a; }
  .sidebar-empty { font-size: 12px; color: #444; padding: 16px 14px; text-align: center; }

  /* 채팅 메인 */
  #chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .chat-header {
    background: #fff; border-bottom: 1px solid #e0e0e0;
    padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .chat-header-left { display: flex; align-items: center; gap: 12px; }
  .chat-header-icon {
    width: 38px; height: 38px; border-radius: 50%;
    background: #e8f0fe; display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .chat-header-title { font-size: 15px; font-weight: 600; color: #111; }
  .chat-header-sub { font-size: 12px; color: #888; }
  .btn-clear {
    font-size: 12px; padding: 6px 12px; border: 1px solid #ddd;
    border-radius: 8px; background: #fff; color: #888; cursor: pointer;
  }
  .btn-clear:hover { background: #fff0f0; color: #e53935; border-color: #e53935; }

  .date-divider {
    text-align: center; font-size: 12px; color: #aaa; margin: 8px 0; position: relative;
  }
  .date-divider::before, .date-divider::after {
    content: ''; position: absolute; top: 50%; width: 38%; height: 1px; background: #e0e0e0;
  }
  .date-divider::before { left: 0; }
  .date-divider::after { right: 0; }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 1.5rem 1rem;
    display: flex; flex-direction: column; gap: 14px;
  }

  .msg-row { display: flex; gap: 8px; align-items: flex-end; }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600;
  }
  .msg-avatar.bot { background: #e8f0fe; color: #1a73e8; }
  .msg-avatar.user { background: #f0f0f0; color: #555; }
  .msg-col { display: flex; flex-direction: column; max-width: 72%; }
  .msg-bubble {
    padding: 11px 15px; border-radius: 18px;
    font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word;
  }
  .msg-bubble.bot { background: #fff; border: 1px solid #e0e0e0; color: #111; border-bottom-left-radius: 4px; }
  .msg-bubble.user { background: #111; color: #fff; border-bottom-right-radius: 4px; }
  .msg-time { font-size: 10px; color: #bbb; margin-top: 4px; text-align: right; }
  .msg-row.bot .msg-time { text-align: left; }

  .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
  .typing-indicator span {
    width: 7px; height: 7px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }



  .chat-input-area {
    background: #fff; border-top: 1px solid #e0e0e0;
    padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
  }
  .chat-input-area textarea {
    flex: 1; padding: 10px 15px; font-size: 14px;
    border: 1px solid #ddd; border-radius: 22px; resize: none;
    max-height: 120px; background: #fafafa; color: #111;
    font-family: inherit; line-height: 1.5; overflow-y: auto;
  }
  .chat-input-area textarea:focus { outline: none; border-color: #888; }
  .btn-send {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: #111; color: #fff; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .btn-send:hover { background: #333; }
  .btn-send:disabled { opacity: 0.3; cursor: default; }

  .confirm-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 100;
  }
  .confirm-box {
    background: #fff; border-radius: 14px; padding: 1.5rem;
    width: 300px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .confirm-box p { font-size: 15px; color: #111; margin-bottom: 1.2rem; line-height: 1.5; }
  .confirm-btns { display: flex; gap: 8px; }
  .confirm-btns button { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 1px solid #ddd; }
  .btn-cancel { background: #fff; color: #555; }
  .btn-confirm-del { background: #e53935; color: #fff; border-color: #e53935; font-weight: 600; }
</style>
</head>
<body>

<!-- 셋업 화면 -->
<div id="setup-screen">
  <div class="setup-card">
    <h2>🎓 대우능력개발원</h2>
    <p>관리자에게 받은 API 키를 입력하면 바로 시작할 수 있어요.</p>
    <input type="password" id="api-key-input" placeholder="API 키 입력 (sk-proj-...)" />
    <button class="btn-start" onclick="startChat()">시작하기</button>
    <p class="error-msg" id="error-msg">⚠️ API 키를 다시 확인해주세요.</p>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app-layout" style="display:none; flex-direction:row;">

  <!-- 사이드바 -->
  <div id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">🎓 대우능력개발원</span>
      <button class="btn-new-chat" onclick="newChat()">+ 새 대화</button>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </div>

  <!-- 채팅 메인 -->
  <div id="chat-main">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-header-icon">🤖</div>
        <div>
          <div class="chat-header-title" id="chat-title">새 대화</div>
          <div class="chat-header-sub">AI 학습 도우미</div>
        </div>
      </div>
      <button class="btn-clear" onclick="showConfirm()">🗑️ 대화 삭제</button>
    </div>

    <div class="chat-messages" id="chat-messages"></div>



    <div class="chat-input-area">
      <textarea id="user-input" placeholder="질문을 입력하세요... (Shift+Enter: 줄바꿈)" rows="1"
        oninput="autoResize(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
      <button class="btn-send" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p>이 대화를 삭제할까요?<br><small style="color:#aaa">이 작업은 되돌릴 수 없어요.</small></p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="hideConfirm()">취소</button>
      <button class="btn-confirm-del" onclick="deleteCurrentChat()">삭제</button>
    </div>
  </div>
</div>

<script>
  const APIKEY_STORAGE = 'qa_api_key';
  const CHATS_STORAGE = 'qa_chats';

  const SYSTEM_PROMPT = `당신은 친절하고 유능한 AI 어시스턴트입니다. 어떤 질문이든 성실하고 명확하게 답변해주세요. 한국어로 답변하세요.`;

  let apiKey = '';
  let currentChatId = null;
  let chats = {}; // { chatId: { id, title, date, messages[] } }

  /* ───── 유틸 ───── */
  function getToday() {
    return new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
  }
  function getTime() {
    return new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
  }
  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  }

  /* ───── 저장/불러오기 ───── */
  function saveChats() {
    localStorage.setItem(CHATS_STORAGE, JSON.stringify(chats));
  }
  function loadChats() {
    try {
      const s = localStorage.getItem(CHATS_STORAGE);
      return s ? JSON.parse(s) : {};
    } catch(e) { return {}; }
  }

  /* ───── 사이드바 렌더 ───── */
  function renderSidebar() {
    const list = document.getElementById('sidebar-list');
    list.innerHTML = '';
    const ids = Object.keys(chats).sort((a,b) => b.localeCompare(a));
    if (ids.length === 0) {
      list.innerHTML = '<div class="sidebar-empty">대화 기록이 없어요</div>';
      return;
    }
    // 날짜별 그룹
    const groups = {};
    ids.forEach(id => {
      const d = chats[id].date || '날짜 없음';
      if (!groups[d]) groups[d] = [];
      groups[d].push(id);
    });
    Object.keys(groups).forEach(date => {
      const label = document.createElement('div');
      label.className = 'sidebar-date-label';
      label.textContent = date;
      list.appendChild(label);
      groups[date].forEach(id => {
        const item = document.createElement('div');
        item.className = 'sidebar-item' + (id === currentChatId ? ' active' : '');
        item.innerHTML = `<span class="sidebar-item-text">${chats[id].title || '새 대화'}</span>
          <button class="sidebar-item-del" onclick="event.stopPropagation(); confirmDeleteChat('${id}')">✕</button>`;
        item.onclick = () => loadChat(id);
        list.appendChild(item);
      });
    });
  }

  /* ───── 대화 로드 ───── */
  function loadChat(id) {
    currentChatId = id;
    const chat = chats[id];
    document.getElementById('chat-title').textContent = chat.title || '새 대화';
    const container = document.getElementById('chat-messages');
    container.innerHTML = '';


    let lastDate = '';
    chat.messages.forEach(msg => {
      const d = msg.date || getToday();
      if (d !== lastDate) { addDateDivider(d); lastDate = d; }
      renderMessage(msg.role === 'user' ? 'user' : 'bot', msg.content, msg.time || '');
    });
    if (chat.messages.length === 0) {
      addDateDivider(getToday());
      renderMessage('bot', '안녕하세요! 대우능력개발원 AI 학습 도우미입니다 😊\n궁금한 것을 뭐든 물어보세요!', getTime());
    }
    renderSidebar();
    container.scrollTop = container.scrollHeight;
  }

  /* ───── 새 대화 ───── */
  function newChat() {
    const id = genId();
    chats[id] = { id, title: '새 대화', date: getToday(), messages: [] };
    saveChats();
    loadChat(id);
  }

  /* ───── 셋업 ───── */
  function startChat() {
    const key = document.getElementById('api-key-input').value.trim();
    if (!key.startsWith('sk-')) {
      document.getElementById('error-msg').style.display = 'block';
      return;
    }
    apiKey = key;
    localStorage.setItem(APIKEY_STORAGE, key);
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app-layout').style.display = 'flex';
    chats = loadChats();
    const ids = Object.keys(chats);
    if (ids.length > 0) {
      loadChat(ids.sort((a,b) => b.localeCompare(a))[0]);
    } else {
      newChat();
    }
  }

  /* ───── 메시지 렌더 ───── */
  function addDateDivider(dateStr) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'date-divider';
    div.textContent = dateStr;
    container.appendChild(div);
  }

  function renderMessage(role, text, time) {
    const container = document.getElementById('chat-messages');
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar ' + role;
    avatar.textContent = role === 'bot' ? 'AI' : '나';
    const col = document.createElement('div');
    col.className = 'msg-col';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble ' + role;
    bubble.textContent = text;
    const timeEl = document.createElement('div');
    timeEl.className = 'msg-time';
    timeEl.textContent = time;
    col.appendChild(bubble); col.appendChild(timeEl);
    row.appendChild(avatar); row.appendChild(col);
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function addTyping() {
    const container = document.getElementById('chat-messages');
    const row = document.createElement('div');
    row.className = 'msg-row bot'; row.id = 'typing-row';
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar bot'; avatar.textContent = 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble bot';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    row.appendChild(avatar); row.appendChild(bubble);
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }
  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  /* ───── 메시지 전송 ───── */
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || !currentChatId) return;
    input.value = ''; input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;


    const chat = chats[currentChatId];
    const today = getToday();
    const time = getTime();

    // 날짜 구분선
    const lastMsg = chat.messages[chat.messages.length - 1];
    if (!lastMsg || lastMsg.date !== today) addDateDivider(today);

    renderMessage('user', text, time);
    chat.messages.push({ role: 'user', content: text, date: today, time });

    // 제목 자동 설정 (첫 메시지)
    if (chat.messages.length === 1) {
      chat.title = text.length > 20 ? text.slice(0, 20) + '…' : text;
      document.getElementById('chat-title').textContent = chat.title;
    }
    saveChats();
    renderSidebar();
    addTyping();

    const apiMessages = chat.messages
      .filter(m => m.role === 'user' || m.role === 'assistant')
      .map(m => ({ role: m.role, content: m.content }));

    try {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...apiMessages],
          max_tokens: 1000
        })
      });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        renderMessage('bot', '오류: ' + data.error.message, getTime());
      } else {
        const reply = data.choices[0].message.content;
        const t = getTime();
        renderMessage('bot', reply, t);
        chat.messages.push({ role: 'assistant', content: reply, date: today, time: t });
        saveChats();
      }
    } catch(e) {
      removeTyping();
      renderMessage('bot', '네트워크 오류가 발생했어요. 잠시 후 다시 시도해주세요.', getTime());
    }
    document.getElementById('send-btn').disabled = false;
  }



  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  /* ───── 삭제 ───── */
  let chatToDelete = null;
  function showConfirm() {
    chatToDelete = currentChatId;
    document.getElementById('confirm-overlay').style.display = 'flex';
  }
  function confirmDeleteChat(id) {
    chatToDelete = id;
    document.getElementById('confirm-overlay').style.display = 'flex';
  }
  function hideConfirm() {
    document.getElementById('confirm-overlay').style.display = 'none';
    chatToDelete = null;
  }
  function deleteCurrentChat() {
    const id = chatToDelete;
    if (!id) return;
    delete chats[id];
    saveChats();
    hideConfirm();
    const remaining = Object.keys(chats).sort((a,b) => b.localeCompare(a));
    if (remaining.length > 0) {
      loadChat(remaining[0]);
    } else {
      newChat();
    }
  }

  /* ───── 초기화 ───── */
  window.onload = function() {
    const savedKey = localStorage.getItem(APIKEY_STORAGE);
    if (savedKey) {
      apiKey = savedKey;
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('app-layout').style.display = 'flex';
      chats = loadChats();
      const ids = Object.keys(chats).sort((a,b) => b.localeCompare(a));
      if (ids.length > 0) loadChat(ids[0]);
      else newChat();
    }
  };
</script>
</body>
</html>
